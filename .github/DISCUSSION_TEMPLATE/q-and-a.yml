title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Stuck on something? Ask here. Include your Node.js version, OS, and stepproof version — it narrows things down fast.

        For bugs (something that clearly should work but doesn't), use a [Bug Report issue](https://github.com/StanislavBG/stepproof/issues/new?template=bug_report.yml) instead.

  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
      description: Be specific. "It doesn't work" is hard to help with. "I run X and see Y but expect Z" is easy to help with.
      placeholder: "When I run `npx stepproof run` in GitHub Actions, the exit code is always 0 even when tests fail..."
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0 — run `node --version`"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14, Ubuntu 22.04, Windows 11"

  - type: input
    id: stepproof-version
    attributes:
      label: stepproof version
      placeholder: "run `npx stepproof --version`"
